<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم إغلاق الصفحة</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Tajawal", sans-serif;
    background: linear-gradient(-45deg, #1e1e2f, #2c3e50, #34495e, #1e1e2f);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

a {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

a:hover {
    background: #2980b9;
}

/* أيقونات متحركة */
.lock {
    position: absolute;
    font-size: 30px;
    opacity: 0.2;
    animation: float 6s infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-50px);}
    100% {transform: translateY(0);}
}
</style>
</head>

<body>

<!-- أيقونات -->
<div class="lock" style="top:10%; left:20%;">🔒</div>
<div class="lock" style="top:70%; left:10%;">🔒</div>
<div class="lock" style="top:30%; right:15%;">🔒</div>
<div class="lock" style="top:80%; right:25%;">🔒</div>

<div class="container">
    <h1>تم إغلاق الصفحة نهائيًا</h1>
    <p>يرجى التوجه إلى الرابط الجديد:</p>
    <a href="https://ahmadhomepc2008-arch.github.io/unit7-1/">الانتقال إلى الامتحان</a>
</div>


</script>

</body>
</html>
